<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Animation Ultimate Local</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <script>
      /**
       * 外部ファイルを読み込めないため、
       * animation-mixer の最小限のコードをここに直接定義します
       */
      AFRAME.registerComponent('animation-mixer', {
        schema: {
          clip: {default: '*'},
          loop: {default: 'repeat'},
          timeScale: {default: 1},
          crossFadeDuration: {default: 0}
        },
        init: function () {
          this.model = null;
          this.mixer = null;
          this.activeActions = [];
          this.el.addEventListener('model-loaded', (e) => {
            this.model = e.detail.model;
            this.mixer = new THREE.AnimationMixer(this.model);
            if (this.data.clip === '*') {
              this.model.animations.forEach(anim => this.playAnimation(anim));
            }
          });
        },
        playAnimation: function (clip) {
          const action = this.mixer.clipAction(clip);
          action.setLoop(THREE.LoopRepeat).play();
          this.activeActions.push(action);
        },
        tick: function (t, dt) {
          if (this.mixer && !isNaN(dt)) this.mixer.update(dt / 1000 * this.data.timeScale);
        }
      });

      // 診断用
      AFRAME.registerComponent('diag-anim', {
        init: function () {
          const status = document.getElementById('status-text');
          this.el.addEventListener('model-loaded', (e) => {
            const model = e.detail.model;
            if (model.animations && model.animations.length > 0) {
              status.innerHTML = "✅ アニメーション発見！<br>再生を開始しました";
              status.style.color = "#00ff00";
            } else {
              status.innerHTML = "⚠️ アニメーションが見つかりません";
              status.style.color = "orange";
            }
          });
        }
      });
    </script>
  </head>

  <body style="margin: 0; background-color: #222; overflow: hidden;">
    <div id="status-display" style="position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.9); color: white; padding: 15px; border-radius: 8px; font-family: monospace; z-index: 1000;">
      <strong>[システム診断]</strong><br>
      <span id="status-text">モデル読み込み中...</span>
    </div>

    <a-scene>
      <a-assets>
        <a-asset-item id="cat-model" src="model/munchkin_cat-v1.glb"></a-asset-item>
      </a-assets>

      <a-entity position="0 0 -3">
        <a-gltf-model 
          id="cat"
          src="#cat-model" 
          scale="3 3 3"
          animation-mixer
          diag-anim>
        </a-gltf-model>
      </a-entity>

      <a-sky color="#111"></a-sky>
      <a-entity light="type: ambient; intensity: 1"></a-entity>
      <a-entity light="type: directional; intensity: 1" position="1 1 1"></a-entity>
      <a-entity camera position="0 1.2 0" look-controls></a-entity>
    </a-scene>
  </body>
</html>
