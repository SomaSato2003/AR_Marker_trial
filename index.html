<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WebAR Custom Marker</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccarthy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      renderer="logarithmicDepthBuffer: true; colorManagement: true;">
      
      <a-assets>
        <a-asset-item id="my-model" src="model/munchkin_cat.glb"></a-asset-item>
      </a-assets>

      <a-marker type="pattern" url="img/pattern-QR_728497.patt">
        
        <a-gltf-model 
          src="#my-model" 
          animation-mixer="clip: *; loop: repeat;" 
          scale="50 50 50" 
          position="0 0 0" 
          rotation="0 0 0">
        </a-gltf-model>
        
      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
