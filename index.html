<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WebAR Custom Marker Example</title>
    <!-- A-Frameの読み込み -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- AR.jsの読み込み -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <!-- animation-mixer (アニメーション再生) -->
    <script src="https://cdn.jsdelivr.net/npm/aframe-animation-mixer@5.0.1/dist/aframe-animation-mixer.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <!-- ARシーンの作成 -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <!-- 3Dモデルを事前に読み込む（assetsの中に定義） -->
      <a-assets>
        <!-- ★ダウンロードしたモデルのパスを指定します★ -->
        <!-- 例として "model/scene.gltf" としています。フォルダ構成に合わせて変更してください -->
        <a-asset-item id="my-model" src="model/tuxedo_cat_animated_2.0/scene.gltf"></a-asset-item>
      </a-assets>

      <!-- ご指定のカスタムマーカー -->
      <a-marker type="pattern" url="img/pattern-QR_728497.patt">
        
        <!-- 赤い立方体の代わりに、読み込んだ3Dモデルを表示 -->
        <!-- もし表示されない（大きすぎる/小さすぎる）場合は、scaleの数値を調整してください -->
        <a-gltf-model src="#my-model" animation-mixer="loop: repeat" scale="0.1 0.1 0.1" position="0 0 0" rotation="0 0 0"></a-gltf-model>
        
      </a-marker>
      
      <!-- カメラを追加 -->
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
