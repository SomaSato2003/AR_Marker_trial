<script>
  AFRAME.registerComponent('animation-mixer-local', {
    schema: { timeScale: {default: 1} },
    init: function () {
      this.mixer = null;
      this.el.addEventListener('model-loaded', (e) => {
        const model = e.detail.model;
        if (model.animations && model.animations.length > 0) {
          this.mixer = new THREE.AnimationMixer(model);
          model.animations.forEach(anim => {
            this.mixer.clipAction(anim).play();
          });
        }
      });

      // ★スマホ対策: マーカーが見つかった瞬間に「再生状態」をリセットして叩き起こす
      const marker = document.querySelector('a-marker');
      marker.addEventListener('markerFound', () => {
        if (this.mixer) {
          this.mixer.timeScale = this.data.timeScale; // 速度を再セットして強制始動
        }
      });
    },
    tick: function (t, dt) {
      if (this.mixer && !isNaN(dt)) {
        this.mixer.update(dt / 1000 * this.data.timeScale);
      }
    }
  });

  // ★スマホ対策: 画面をタップした時にも全モデルを強制再生させる
  window.addEventListener('touchstart', () => {
    const model = document.querySelector('[animation-mixer-local]');
    if (model) model.play();
  });
</script>
