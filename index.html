<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WebAR Munchkin Cat - Final Success</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <script>
      /**
       * 外部ライブラリ不要でアニメーションを動かす心臓部
       */
      AFRAME.registerComponent('animation-mixer-local', {
        schema: { timeScale: {default: 1} },
        init: function () {
          this.mixer = null;
          this.el.addEventListener('model-loaded', (e) => {
            const model = e.detail.model;
            if (model.animations && model.animations.length > 0) {
              this.mixer = new THREE.AnimationMixer(model);
              // すべてのアニメーションを再生
              model.animations.forEach(anim => {
                this.mixer.clipAction(anim).play();
              });
              console.log("AR Animation Started!");
            }
          });
        },
        tick: function (t, dt) {
          if (this.mixer && !isNaN(dt)) {
            this.mixer.update(dt / 1000 * this.data.timeScale);
          }
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      renderer="logarithmicDepthBuffer: true; colorManagement: true;">
      
      <a-assets>
        <a-asset-item id="cat-model" src="model/munchkin_cat-v1.glb"></a-asset-item>
      </a-assets>

      <a-marker type="pattern" url="img/pattern-QR_728497.patt">
        <a-gltf-model 
          src="#cat-model" 
          scale="2 2 2" 
          position="0 0 0" 
          animation-mixer-local>
        </a-gltf-model>
      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
