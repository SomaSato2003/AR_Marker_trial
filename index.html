<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Hybrid AR: Marker to Hand (Rear Camera)</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
      AFRAME.registerComponent('animation-mixer-local', {
        init: function () {
          this.mixer = null;
          this.el.addEventListener('model-loaded', (e) => {
            const model = e.detail.model;
            if (model.animations && model.animations.length > 0) {
              this.mixer = new THREE.AnimationMixer(model);
              model.animations.forEach(anim => { this.mixer.clipAction(anim).play(); });
            }
          });
        },
        tick: function (t, dt) {
          if (this.mixer && !isNaN(dt)) this.mixer.update(dt / 1000);
        }
      });

      AFRAME.registerComponent('hybrid-bridge', {
        init: function () {
          this.cat = document.querySelector('#cat-model-entity');
          this.marker = document.querySelector('#marker');
          this.status = document.getElementById('status-text');
          this.handInFrame = false;

          const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
          hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

          hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
              const landmarks = results.multiHandLandmarks[0];
              const handedness = results.multiHandedness[0].label;

              const v1 = { x: landmarks[5].x - landmarks[0].x, y: landmarks[5].y - landmarks[0].y };
              const v2 = { x: landmarks[17].x - landmarks[0].x, y: landmarks[17].y - landmarks[0].y };
              const crossProduct = v1.x * v2.y - v1.y * v2.x;
              
              // 外カメラ(鏡映反転なし)の場合、判定を調整
              let isPalm = (handedness === "Left") ? (crossProduct < 0) : (crossProduct > 0);

              if (isPalm) {
                const lm = landmarks[9];
                this.moveToHand(lm.x, lm.y);
                this.handInFrame = true;
                this.status.innerText = "✅ 手のひらに移動中";
              } else {
                this.handInFrame = false;
                this.status.innerText = "✋ 手の甲を検知：マーカーに戻ります";
              }
            } else {
              this.handInFrame = false;
              this.status.innerText = "🔍 マーカーまたは手を探しています";
            }
          });

          const startMediaPipe = () => {
            const video = document.querySelector('#arjs-video');
            if (video) {
              // MediaPipeのカメラ設定を外向きに固定
              const camera = new Camera(video, { 
                onFrame: async () => { await hands.send({image: video}); },
                facingMode: 'environment' 
              });
              camera.start();
            } else { setTimeout(startMediaPipe, 500); }
          };
          startMediaPipe();
        },

        moveToHand: function (hx, hy) {
          const x = (hx - 0.5) * 4;
          const y = -(hy - 0.5) * 3;
          const z = -3;
          this.el.sceneEl.object3D.add(this.cat.object3D);
          this.cat.object3D.position.set(x, y, z);
          this.cat.object3D.rotation.set(0, 0, 0);
        },

        tick: function () {
          if (!this.handInFrame) {
            this.marker.object3D.add(this.cat.object3D);
            this.cat.object3D.position.set(0, 0, 0);
          }
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <div id="status-display" style="position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.8); color: white; padding: 15px; border-radius: 8px; font-family: sans-serif; z-index: 1000; pointer-events: none;">
      <strong>Hybrid Cat AR (Rear Cam)</strong><br>
      <span id="status-text">システム起動中...</span>
    </div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; facingMode: environment;"
      renderer="logarithmicDepthBuffer: true; colorManagement: true;"
      hybrid-bridge>
      
      <a-assets>
        <a-asset-item id="cat-model" src="model/munchkin_cat-v1.glb"></a-asset-item>
      </a-assets>

      <a-marker type="pattern" url="img/pattern-QR_728497.patt" id="marker">
        <a-entity id="cat-model-entity">
           <a-gltf-model 
            src="#cat-model" 
            scale="2 2 2" 
            animation-mixer-local>
          </a-gltf-model>
        </a-entity>
      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
