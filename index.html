<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WebAR Custom Marker</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccarthy/aframe-extras@v7.2.0/dist/aframe-extras.min.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      renderer="logarithmicDepthBuffer: true; colorManagement: true; antialias: true;">
      
      <a-assets>
        <a-asset-item id="my-model" src="model/munchkin_cat-v1.glb"></a-asset-item>
      </a-assets>

      <a-marker type="pattern" url="img/pattern-QR_728497.patt">
        
        <a-gltf-model 
          src="#my-model" 
          animation-mixer="clip: *; loop: repeat; clampWhenFinished: true;" 
          scale="2 2 2" 
          position="0 0 0" 
          rotation="0 0 0">
        </a-gltf-model>
        
      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // 画面をどこでもいいからクリックした時にアニメーションを開始させる（ブラウザ制限対策）
      window.addEventListener('click', function () {
        const model = document.querySelector('a-gltf-model');
        model.setAttribute('animation-mixer', {timeScale: 1});
      });
    </script>
  </body>
</html>
