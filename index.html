<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WebAR Munchkin Cat Final</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccarthy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      renderer="colorManagement: true;">
      
      <a-assets>
        <a-asset-item id="my-model" src="model/munchkin_cat-v1.glb"></a-asset-item>
      </a-assets>

      <a-marker 
        type="pattern" 
        url="img/pattern-QR_728497.patt"
        id="marker">
        
        <a-gltf-model 
          id="cat"
          src="#my-model" 
          animation-mixer="clip: *; loop: repeat; active: true;" 
          scale="2 2 2" 
          position="0 0 0" 
          rotation="0 0 0"
          sync-animation> </a-gltf-model>
      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // モデルが読み込まれた時と、マーカーが見つかった時の両方で再生を叩く
      AFRAME.registerComponent('sync-animation', {
        init: function () {
          const el = this.el;

          // モデル読み込み完了時
          el.addEventListener('model-loaded', () => {
            console.log("Model loaded. Starting animation...");
            el.setAttribute('animation-mixer', {timeScale: 1});
          });

          // マーカー認識時
          const marker = document.querySelector('#marker');
          marker.addEventListener('markerFound', () => {
            console.log("Marker found. Resuming animation...");
            // 一度timeScaleを0にしてから1に戻すことで、強制的に再生を蹴り出します
            el.setAttribute('animation-mixer', {timeScale: 0});
            setTimeout(() => {
              el.setAttribute('animation-mixer', {timeScale: 1});
            }, 100);
          });
        }
      });

      // ブラウザ制限対策：画面クリックで全モデルを再生
      window.addEventListener('click', function () {
        const cat = document.querySelector('#cat');
        if (cat) {
            cat.setAttribute('animation-mixer', {timeScale: 1});
            console.log("Global play triggered via click");
        }
      });
    </script>
  </body>
</html>
