<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WebAR Final Force Play</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-animation-mixer@5.0.1/dist/aframe-animation-mixer.min.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      renderer="colorManagement: true;">
      
      <a-assets>
        <a-asset-item id="my-model" src="model/munchkin_cat.glb"></a-asset-item>
      </a-assets>

      <a-marker 
        type="pattern" 
        url="img/pattern-QR_728497.patt"
        id="marker">
        
        <a-gltf-model 
          id="cat"
          src="#my-model" 
          animation-mixer="loop: repeat" 
          scale="2 2 2" 
          position="0 0 0" 
          rotation="0 0 0">
        </a-gltf-model>
      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      AFRAME.registerComponent('force-play-on-found', {
        init: function () {
          const model = document.querySelector('#cat');

          // マーカーが見つかった時の処理
          this.el.addEventListener('markerFound', () => {
            console.log("Marker Found! Forcing Animation Play...");
            
            // 1. コンポーネント自体を再生状態にする
            if (model.components['animation-mixer']) {
              model.components['animation-mixer'].play();
            }
            
            // 2. A-Frameのエンティティとして再生命令を出す
            model.play();

            // 3. 念押しで属性を再セット
            model.setAttribute('animation-mixer', {timeScale: 1});
          });
        }
      });

      // ブラウザの自動再生ブロック解除用（画面クリック）
      window.addEventListener('click', function () {
        const model = document.querySelector('#cat');
        if (model) {
          model.play();
          if (model.components['animation-mixer']) {
            model.components['animation-mixer'].play();
          }
          console.log("User Clicked: Force Play Executed");
        }
      });
    </script>
  </body>
</html>
